version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fluxo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fluxo
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
    command: >
      sh -c "python3 -c 'from core.db.crud import init_db, create_tables, seed_junctions; import asyncio; init_db(\"$DATABASE_URL\"); asyncio.run(create_tables()); asyncio.run(seed_junctions())' &&
             python3 -m uvicorn core.api.main:app --host 0.0.0.0 --port 8000"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

  pipeline:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fluxo
      REDIS_URL: redis://redis:6379
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: python3 scripts/live_camera.py --source "http://host.docker.internal:8080/video" --violations --show --push-api
    profiles:
      - live

volumes:
  pgdata:
